<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg-color: #0f001a;
      --card-bg: rgba(45, 10, 80, 0.6);
      --accent-color: #ff8800;
      --text-main: #ffffff;
      --font-main: 'Montserrat', sans-serif;
    }

    body {
      margin: 0; padding: 40px;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-main);
    }

    header { text-align: center; margin-bottom: 50px; }

    .search-bar {
      width: 100%; max-width: 600px;
      padding: 15px 25px; border-radius: 2px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: white; outline: none;
    }

    .section-title { font-size: 1.8rem; font-weight: 800; margin: 30px 0; letter-spacing: 2px; text-transform: lowercase; }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
    }

    .game-card {
      background: var(--card-bg);
      border-radius: 2px; padding: 20px;
      display: flex; align-items: center; gap: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease; cursor: pointer;
      position: relative; text-decoration: none; color: inherit;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-color);
      background: rgba(60, 15, 110, 0.8);
    }

    .game-icon { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; }
    .game-info h3 { margin: 0; font-size: 1.2rem; }
    .game-info p { margin: 5px 0 0; font-size: 0.85rem; opacity: 0.6; }
    .badge { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; color: var(--accent-color); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <input type="text" id="searchInput" class="search-bar" placeholder="Type here to search games..." onkeyup="filterGames()">
    <div class="section-title">top games</div>
  </header>

  <div class="game-grid" id="gameGrid">
    <!-- Loading State -->
    <p>Loading games...</p>
  </div>

  <script>
    async function loadGames() {
      try {
        // Fetch the list from your package.json
        const response = await fetch('games/package.json');
        const data = await response.json();
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';

        data.games.forEach(game => {
          const card = document.createElement('a');
          card.className = 'game-card';
          card.id = game.id;
          // Directs to games/[id].html
          card.href = `games/${game.id}.html`; 
          
          card.innerHTML = `
            <img src="${game.icon}" class="game-icon" alt="${game.title}">
            <div class="game-info">
              <h3>${game.title}</h3>
              <p>${game.description}</p>
            </div>
            <div class="badge">${game.badge}</div>
          `;
          grid.appendChild(card);
        });
      } catch (e) {
        console.error("Failed to load games list:", e);
      }
    }

    function filterGames() {
      let input = document.getElementById('searchInput').value.toLowerCase();
      let cards = document.getElementsByClassName('game-card');
      
      for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector('h3').innerText.toLowerCase();
        cards[i].style.display = title.includes(input) ? "flex" : "none";
      }
    }

    window.onload = loadGames;
  </script>
</body>
</html>
